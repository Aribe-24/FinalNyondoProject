<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO GENERAL HARDWARE</title>
    </head>
    <style>
body{
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f6;
}

/* Main Container */
.container{
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* Heading */
.container h1{
    font-size: 55px;
    color: #1e1f26;
    margin-bottom: 15px;
}

/* Paragraph */
.container p{
    font-size: 20px;
    color: #666;
    margin-bottom: 35px;
}

/* Button */
.btn{
    text-decoration: none;
    background: #ff9800;
    color: white;
    padding: 15px 35px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.btn:hover{
    background: #e68900;
    transform: translateY(-3px);
}

</style>
<body>
    <div class="container">
        <h1>Welcome to Nyondo Hardware</h1>
        <p>Your one-stop shop for all your hardware needs!</p>
        <a href="{% url 'login' %}" class="btn">Go to Login</a>
    </div>
</body>
</html>
